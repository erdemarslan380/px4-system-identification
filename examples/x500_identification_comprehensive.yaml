name: x500_identification_comprehensive
rootfs: build/px4_sitl_default/rootfs
output_dir: runs/x500_identification_comprehensive
defaults:
  takeoff_alt: 2.0
  takeoff_timeout: 45.0
  trajectory_timeout: auto
  sim_speed_factor: 1.0
  simulator: gz
  simulator_vehicle: x500
  simulator_world: default
  landing_mode: land
  trace_window: offboard
  engagement_dwell_s: 2.0
  mission_mode: identification
sorties:
