module_name: trajectory_reader

parameters:
  - group: Trajectory Reader
    definitions:
      TRJ_RC_SEL_EN:
        description:
          short: Enable RC trajectory or profile selection
          long: |
            When enabled, one AUX channel selects either the active trajectory id
            or the active identification profile, depending on the module mode.
        type: boolean
        default: 0

      TRJ_RC_MODE_EN:
        description:
          short: Enable RC workflow selection
          long: |
            When enabled, one AUX channel selects the workflow that will be applied
            when the configured RC start button is pressed.
        type: boolean
        default: 0

      TRJ_RC_MODE_CH:
        description:
          short: RC AUX channel used for workflow selection
        type: int32
        min: 1
        max: 6
        default: 4

      TRJ_RC_SEL_CH:
        description:
          short: RC AUX channel used for selection
        type: int32
        min: 1
        max: 6
        default: 6

      TRJ_RC_MIN_ID:
        description:
          short: Minimum trajectory id reachable by the RC selector
        type: int32
        min: 0
        max: 255
        default: 100

      TRJ_RC_MAX_ID:
        description:
          short: Maximum trajectory id reachable by the RC selector
        type: int32
        min: 0
        max: 255
        default: 104

      TRJ_RC_START_EN:
        description:
          short: Enable RC button workflow trigger
          long: |
            When enabled, the selected workflow is applied on the rising edge of the
            configured button in manual_control_setpoint.buttons.
        type: boolean
        default: 0

      TRJ_RC_START_BTN:
        description:
          short: One-based RC button index used as the workflow trigger
        type: int32
        min: 1
        max: 16
        default: 1

      TRJ_IDENT_PROF:
        description:
          short: Identification profile
        type: enum
        values:
          0: Hover thrust
          1: Roll sweep
          2: Pitch sweep
          3: Yaw sweep
          4: Drag X
          5: Drag Y
          6: Drag Z
          7: Mass vertical
          8: Motor step
        min: 0
        max: 8
        default: 0

      TRJ_CAMPAIGN:
        description:
          short: Built-in maneuver campaign
          long: |
            Selects an optional built-in sequence that can run multiple
            identification maneuvers and validation trajectories from one
            anchor position without logging the return-to-anchor segments.
        type: enum
        values:
          0: Disabled
          1: Identification only (9 maneuvers)
          2: Full stack (9 maneuvers + 5 trajectories)
          3: Trajectory only (5 trajectories)
        min: 0
        max: 3
        default: 0

      TRJ_CAMPAIGN_CMD:
        description:
          short: Campaign command trigger
          long: |
            Set to Start to arm the selected campaign. The module consumes the
            command and resets it back to Idle after accepting it.
        type: enum
        values:
          0: Idle
          1: Start
          2: Stop
        min: 0
        max: 2
        default: 0

      TRJ_CAMPAIGN_STA:
        description:
          short: Campaign execution status
          long: |
            Readback status for the built-in campaign helper scripts.
        type: enum
        values:
          0: Idle
          1: Active
          2: Completed
          3: Aborted
        min: 0
        max: 3
        default: 0

      TRJ_MODE_CMD:
        description:
          short: Active trajectory reader mode
        type: enum
        values:
          0: Position
          1: Trajectory
          2: Identification
        min: 0
        max: 2
        default: 0

      TRJ_ACTIVE_ID:
        description:
          short: Active trajectory id
        type: int32
        min: 0
        max: 255
        default: 100

      TRJ_ANCHOR_X:
        description:
          short: Trajectory anchor X in local NED
        type: float
        default: 0.0

      TRJ_ANCHOR_Y:
        description:
          short: Trajectory anchor Y in local NED
        type: float
        default: 0.0

      TRJ_ANCHOR_Z:
        description:
          short: Trajectory anchor Z in local NED
        type: float
        default: -3.0
